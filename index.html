<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operational Layer</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#020409;
  color:#fff;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
}

.brand{
  font-size:12px;
  letter-spacing:.2em;
  text-transform:uppercase;
}

/* HERO */
.hero{
  padding:120px 30px;
  text-align:center;
}

.title{
  font-size:52px;
  font-weight:700;
  max-width:900px;
  margin:auto;
}

.subtitle{
  color:#8e97a8;
  margin-top:20px;
}

/* PATHWAY */
.pathway{
  position:relative;
  height:110px;
}

.path-dot{
  position:absolute;
  top:50%;
  transform:translate(-50%,-50%);
  width:32px;
  height:32px;
  border-radius:50%;
}

.dot-blue{background:#4f7bff;}
.dot-red{background:#ff5d73;}
.dot-half{
  background:linear-gradient(135deg,#4f7bff 50%,#ff5d73 50%);
}

.d1{left:10%}
.d2{left:30%}
.d3{left:50%}
.d4{left:70%}
.d5{left:90%}

/* SECTIONS */
.section{
  padding:100px 30px;
  text-align:center;
}

/* BUTTONS */
.btn{
  padding:14px 22px;
  border-radius:999px;
  text-decoration:none;
  display:inline-block;
}

.btn.primary{
  background:#fff;
  color:#000;
}

.btn.ghost{
  background:rgba(255,255,255,.1);
  color:#fff;
}

/* FORM */
.form{
  max-width:600px;
  margin:auto;
}

input,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
  color:#fff;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="brand">Operational Layer</div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="title">
    A business should run for you — not because of you.
  </div>

  <div class="subtitle">
    We create the buffer between the CEO and the operation.
  </div>

  <br><br>

  <a href="#contact" class="btn primary">What’s the wait?</a>
</section>

<!-- PATH -->
<div class="pathway">
  <div class="path-dot dot-blue d1"></div>
  <div class="path-dot dot-half d2"></div>
  <div class="path-dot dot-red d3"></div>
  <div class="path-dot dot-blue d4"></div>
  <div class="path-dot dot-half d5"></div>
</div>

<!-- SECTION -->
<section class="section">
  <h2>The Problem</h2>
  <p>Everything still runs through the owner.</p>
</section>

<!-- PATH -->
<div class="pathway">
  <div class="path-dot dot-red d1"></div>
  <div class="path-dot dot-blue d2"></div>
  <div class="path-dot dot-half d3"></div>
  <div class="path-dot dot-red d4"></div>
  <div class="path-dot dot-blue d5"></div>
</div>

<!-- SECTION -->
<section class="section">
  <h2>The Structure</h2>
  <p>The buffer removes noise and protects execution.</p>
</section>

<!-- CONTACT -->
<section id="contact" class="section">

<form class="form" action="https://formsubmit.co/el/gucice" method="POST">

<input type="hidden" name="_subject" value="Operational Layer inquiry">
<input type="hidden" name="_captcha" value="false">

<input name="name" placeholder="Name" required>
<input name="company" placeholder="Company" required>
<input name="email" type="email" placeholder="Email" required>

<textarea name="message" placeholder="What do you need help with?" required></textarea>

<br>

<button class="btn primary">Send Inquiry</button>

<span style="padding:0 10px;">or</span>

<a href="https://docs.google.com/forms/d/e/1FAIpQLSdBvg8A8ioSDuuskVAX90LebJA2fsHT8zuM_pbTERjH7NfoZA/viewform?usp=publish-editor" target="_blank" class="btn ghost">
Send Inquiry
</a>

</form>

</section>

</body>
</html>
